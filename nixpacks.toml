[phases]
  [phases.setup]
    nixPkgs = ["nodejs", "nodePackages.pnpm"]

  [phases.install]
    cmds = [
      "cd frontend && npm install",
      "pip install -r backend/requirements.txt"
    ]

  [phases.build]
    cmds = [
      "cd frontend && npm run build"
    ]

[start]
  cmd = "uvicorn app:app --host 0.0.0.0 --port $PORT"
